project: eAgent
date: 2026-03-18
status: in_progress
current_focus:
  - phase 1 scaffolding complete — 10 new eagent-* crates with traits and protocol types
  - phase 2 extract — migrate ecode-core providers, tools, persistence into eagent-* crates
  - multi-agent orchestration design (TaskGraph scheduler, AgentPool, ConflictResolver)
  - provider system expansion (ApiKeyProvider for generic OpenAI-compatible endpoints)
  - UI rework for agent traces, plan view, diff review, multi-terminal
architecture:
  platform: eagent_protocol_first
  workstations: ecode_and_ework
  orchestration: planner_plus_parallel_workers
  providers: codex_llamacpp_apikey
  ecosystem: emcps_and_eskills
  ui_scope: tauri_react_desktop_shell
  backend_runtime: rust_core_preserved
crate_structure:
  protocol: eagent-protocol (wire format, AgentMessage, TaskGraph, Agent trait)
  contracts: eagent-contracts (config, provider metadata, oversight model)
  tools: eagent-tools (Tool trait, ToolRegistry)
  providers: eagent-providers (Provider trait, ProviderRegistry)
  persistence: eagent-persistence (shell — EventStore, config)
  runtime: eagent-runtime (shell — scheduler, agent pool, conflict resolver)
  planner: eagent-planner (shell — planner agent, TaskGraph generation)
  skills: eagent-skills (shell — eSkill loader)
  mcp: eagent-mcp (shell — eMCP client)
  index: eagent-index (shell — project graph, symbol index)
  legacy: ecode-contracts, ecode-core, ecode-desktop-app, ecode-gui (to be migrated/deleted)
known_gaps:
  - eagent-* crates are scaffolded with traits but no business logic yet
  - existing ecode-core code needs migration into new crates (Phase 2)
  - multi-agent orchestration not yet implemented (Phase 3)
  - UI shell needs major rework for agent traces and parallel task views (Phase 5)
  - eWork tools (documents, spreadsheets, presentations) not yet implemented (Phase 6)
  - eMCP and eSkill loaders not yet implemented (Phase 7)
  - project index / tree-sitter integration not yet implemented (Phase 8)
